apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservicio-eva3
  labels:
    app: fastapi-app
spec:
  replicas: 2 # Levantaremos 2 copias para asegurar disponibilidad
  selector:
    matchLabels:
      app: microservicio-eva3
  template:
    metadata:
      labels:
        app: microservicio-eva3
      annotations:                            
        prometheus.io/scrape: "true"           
        prometheus.io/port: "8000"             
        prometheus.io/path: "/metrics"         
    spec:
      containers:
      - name: fastapi-container
        image: vichonwos/eva3:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "250m"
            memory: "128Mi"